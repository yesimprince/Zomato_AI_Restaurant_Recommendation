<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered restaurant recommendations using Zomato data. Get personalized picks based on location, budget, cuisine, and rating preferences." />
  <title>Zomato AI Recommender</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23e23744'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='700' font-size='18'>Z</text></svg>" />
</head>
<body>
  <div class="app-container" id="app">

    <!-- ═══ APP HEADER ═══ -->
    <header class="app-header" id="app-header">
      <div class="header-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle sidebar">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <div class="brand-badge"><span>Z</span></div>
        <div class="brand-text">
          <span class="brand-name">Zomato</span>
          <span class="brand-subtitle">AI Recommender</span>
        </div>
      </div>
      <div class="header-right">
        <div class="status-dot disconnected" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
    </header>

    <!-- ═══ APP BODY ═══ -->
    <div class="app-body">

      <!-- Sidebar overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- ═══ PREFERENCE SIDEBAR ═══ -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <p class="sidebar-header-title">Your Preferences</p>
          <p class="sidebar-header-subtitle">Fill in the details below to get AI-curated picks.</p>
        </div>

        <form class="sidebar-form" id="preference-form" autocomplete="off">

          <!-- Location -->
          <div class="form-field">
            <label class="field-label" for="location-select">
              <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg></span>
              <span>Location</span>
              <span class="required">*</span>
            </label>
            <div class="select-wrapper">
              <select class="select-input" id="location-select" required>
                <option value="">Select a city…</option>
              </select>
              <span class="select-chevron"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
            </div>
          </div>

          <!-- Budget -->
          <div class="form-field">
            <label class="field-label">
              <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg></span>
              <span>Budget</span>
              <span class="required">*</span>
            </label>
            <div class="budget-group" id="budget-group" role="radiogroup" aria-label="Budget tier">
              <button type="button" class="budget-option" data-value="low" role="radio" aria-checked="false">
                <span class="budget-label">Low</span>
                <span class="budget-range">Under ₹500</span>
              </button>
              <button type="button" class="budget-option selected" data-value="medium" role="radio" aria-checked="true">
                <span class="budget-label">Medium</span>
                <span class="budget-range">₹500–₹1200</span>
              </button>
              <button type="button" class="budget-option" data-value="high" role="radio" aria-checked="false">
                <span class="budget-label">High</span>
                <span class="budget-range">Above ₹1200</span>
              </button>
            </div>
          </div>

          <!-- Minimum Rating -->
          <div class="form-field">
            <label class="field-label" for="rating-slider">
              <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.12 2.12 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.12 2.12 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.12 2.12 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.12 2.12 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.12 2.12 0 0 0 1.597-1.16z"/></svg></span>
              <span>Minimum Rating</span>
              <span class="required">*</span>
              <span class="value-display" id="rating-value">4.0</span>
            </label>
            <div class="slider-track" id="slider-track">
              <div class="slider-fill" id="slider-fill" style="width: 80%"></div>
              <div class="slider-thumb" id="slider-thumb" style="left: calc(80% - 8px)"></div>
              <input type="range" class="slider-native" id="rating-slider" min="0" max="5" step="0.5" value="4" aria-label="Minimum rating" />
            </div>
            <div class="slider-labels">
              <span>0.0</span>
              <span>5.0</span>
            </div>
          </div>

          <!-- Cuisine -->
          <div class="form-field">
            <label class="field-label">
              <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20m14-7V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2zm0 0v7"/></svg></span>
              <span>Cuisine</span>
              <span class="optional">(optional)</span>
            </label>
            <div class="select-wrapper">
              <select class="select-input" id="cuisine-select">
                <option value="">Any cuisine…</option>
              </select>
              <span class="select-chevron"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
            </div>
          </div>

          <!-- Additional Preferences -->
          <div class="form-field">
            <label class="field-label" for="additional-input">
              <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></svg></span>
              <span>Additional Preferences</span>
              <span class="optional">(optional)</span>
            </label>
            <textarea class="textarea-input" id="additional-input" placeholder="e.g. family-friendly, outdoor seating, quick service…" rows="3"></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submit-btn">
            <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594zM20 2v4m2-2h-4"/><circle cx="4" cy="20" r="2"/></svg></span>
            <span>Find Restaurants</span>
          </button>

        </form>
      </aside>

      <!-- ═══ MAIN CONTENT ═══ -->
      <main class="main-content" id="main-content">

        <!-- Active Filters Bar -->
        <div class="filters-bar hidden" id="filters-bar">
          <span class="filters-label">Filters:</span>
          <div id="filter-chips-container"></div>
        </div>

        <!-- Results area -->
        <div class="main-content-inner" id="results-area">
          <!-- Empty state (default) -->
          <div class="empty-state" id="empty-state">
            <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20m14-7V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2zm0 0v7"/></svg>
            <h3>Discover Your Next Favorite Spot</h3>
            <p>Set your preferences and let AI find the perfect restaurants for you.</p>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
